{% extends 'hospital/base.html' %}

{% block title %}Logged Out - Hospital Management System{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card dashboard-card">
                <div class="card-body p-5">
                    <i class="bi bi-check-circle display-1 text-success mb-3"></i>
                    <h3 class="mb-3">You have been logged out</h3>
                    <p class="text-muted mb-4">Thank you for using our Hospital Management System.</p>
                    <a href="{% url 'login' %}" class="btn btn-primary">
                        <i class="bi bi-box-arrow-in-right"></i> Login Again
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
